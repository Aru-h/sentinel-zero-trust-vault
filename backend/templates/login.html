<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sentinel Zero Trust</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #0f172a; 
            color: #f8fafc; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card { 
            background-color: #1e293b; 
            border: 1px solid #334155; 
            color: white; 
            width: 100%;
            max-width: 400px;
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }
        .form-control {
            background-color: #0f172a;
            border: 1px solid #334155;
            color: white;
        }
        .form-control:focus {
            background-color: #0f172a;
            border-color: #3b82f6;
            color: white;
            box-shadow: 0 0 0 0.25rem rgba(59, 130, 246, 0.25);
        }
        .btn-primary {
            background-color: #3b82f6;
            border: none;
            font-weight: 600;
            padding: 10px;
        }
        .btn-primary:hover {
            background-color: #2563eb;
        }
        .brand-text {
            letter-spacing: -1px;
        }
    </style>
</head>
<body>
    <div class="login-card p-4 p-md-5">
        <div class="text-center mb-4">
            <h3 class="fw-bold brand-text">
                <span class="text-primary">SENTINEL</span> ZERO
            </h3>
            <p class="text-muted small">Secure Access Gateway</p>
        </div>

        {% with messages = get_flashed_messages(category_filter=["error"]) %}
            {% if messages %}
                <div class="alert alert-danger py-2 text-center" role="alert">
                    {{ messages[0] }}
                </div>
            {% endif %}
        {% endwith %}

        <form method="POST" action="/login">
            <div class="mb-3">
                <label for="username" class="form-label text-muted small fw-bold uppercase">Identity</label>
                <input type="text" class="form-control" id="username" name="username" placeholder="Enter username" required autofocus>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label text-muted small fw-bold uppercase">Credentials</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required>
            </div>
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary">AUTHENTICATE</button>
            </div>
        </form>
        
        <div class="mt-4 text-center">
            <small class="text-muted" style="font-size: 0.75rem;">
                UNAUTHORIZED ACCESS IS PROHIBITED<br>
                ALL ATTEMPTS ARE LOGGED
            </small>
        </div>
    </div>
</body>
</html>
