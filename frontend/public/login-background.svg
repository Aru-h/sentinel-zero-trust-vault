  <g stroke="#57A6FF" stroke-opacity="0.35" stroke-width="2">
    <line x1="220" y1="520" x2="430" y2="520"/>
    <line x1="500" y1="410" x2="760" y2="410"/>
    <line x1="860" y1="620" x2="1120" y2="620"/>
